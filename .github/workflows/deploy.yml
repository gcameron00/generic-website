name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # CF secrets exist only for Worker-target sites, and are set by
      # site-builder AFTER repo creation — skip cleanly when absent
      # (covers both Pages-target repos and the first pre-secrets push).
      - name: Check Cloudflare credentials
        id: creds
        run: echo "ok=${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.creds.outputs.ok == 'true'
        uses: actions/checkout@v6

      - name: Deploy
        if: steps.creds.outputs.ok == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name ${{ github.event.repository.name }}
